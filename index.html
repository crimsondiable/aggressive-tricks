<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <title>Aggressive Tricks</title>
  <style>
    :root {
      --bg:    #080e14;
      --panel: rgba(16,27,34,.62);
      --panel2:rgba(16,27,34,.80);
      --border:rgba(190,242,255,.24);
      --shine: rgba(255,255,255,.10);
      --acc:   #0ea5e9;
      --acc2:  #38bdf8;
      --pip:   #0ea5e9;
      --s0-c:  rgba(255,255,255,.13);
      --s1-c:  #0284c7;
      --s2-c:  #d97706;
      --s3-c:  #16a34a;
      --s4-c:  #ca8a04;
      --text:  #e2f4ff;
      --muted: rgba(190,242,255,.38);
      --r:8px;--rs:5px;--rss:3px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100dvh;
      padding-bottom:calc(60px + env(safe-area-inset-bottom,0px));
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 340px 280px at 20% 0%,rgba(14,165,233,.12) 0%,transparent 70%),
        radial-gradient(ellipse 220px 200px at 85% 85%,rgba(56,189,248,.09) 0%,transparent 70%);
    }

    /* ── HEADER ── */
    header{
      position:sticky;top:0;z-index:100;
      padding-top:env(safe-area-inset-top,0);
      background:rgba(8,14,20,.85);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .hdr-inner{padding:10px 16px 8px}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;letter-spacing:-.4px}
    .logo-ico{
      width:30px;height:30px;
      background:linear-gradient(135deg,var(--acc),var(--acc2));
      border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;
      box-shadow:0 0 14px rgba(14,165,233,.45),inset 0 1px 0 rgba(255,255,255,.18);
      position:relative;overflow:hidden;
    }
    .logo-ico::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.22),transparent)}
    .hdr-counts{display:flex;gap:6px}
    .hdr-count{
      display:flex;align-items:center;gap:4px;
      background:var(--panel);border:1px solid var(--border);border-radius:20px;
      padding:2px 7px;font-size:10px;font-weight:800;
    }
    .dot{width:5px;height:5px;border-radius:50%}

    /* chips */
    .chips{display:flex;align-items:center;gap:5px;overflow-x:auto;padding:8px 16px 6px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .refresh-btn{
      flex-shrink:0;width:26px;height:26px;
      background:var(--panel);border:1px solid var(--border);border-radius:50%;
      color:var(--muted);cursor:pointer;font-size:15px;line-height:1;
      display:flex;align-items:center;justify-content:center;
      transition:all .13s;-webkit-tap-highlight-color:transparent;
    }
    .refresh-btn:active{background:var(--panel2);color:var(--text);transform:rotate(180deg) scale(.9)}
    .chip{
      flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:20px;
      color:var(--muted);cursor:pointer;font-size:11px;font-weight:800;
      padding:4px 11px;transition:all .13s;white-space:nowrap;position:relative;overflow:hidden;
    }
    .chip::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,var(--shine),transparent);border-radius:20px 20px 0 0;pointer-events:none}
    .chip.active{
      background:linear-gradient(135deg,var(--acc),var(--acc2));
      border-color:rgba(56,189,248,.45);color:#fff;
      box-shadow:0 0 12px rgba(14,165,233,.35),inset 0 1px 0 rgba(255,255,255,.18);
    }

    /* ── MAIN ── */
    main{padding:10px 14px;position:relative;z-index:1}
    .view{display:none}.view.active{display:block}
    .trick-list{display:flex;flex-direction:column;gap:5px}

    /* ── TRICK CARD ── */
    .trick-card{
      background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
      padding:7px 10px;cursor:pointer;position:relative;overflow:hidden;
      transition:border-color .13s;-webkit-tap-highlight-color:transparent;
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      box-shadow:0 14px 38px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.09);
      cursor:default;
    }
    .trick-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:40%;
      background:linear-gradient(to bottom,var(--shine),transparent);
      border-radius:var(--r) var(--r) 0 0;pointer-events:none;
    }
    .trick-card.lv4      {border-color:rgba(93,181,239,.9);box-shadow:0 0 8px rgba(255,255,255,.14),0 0 6px rgba(93,181,239,.18),0 14px 38px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.09)}
    .trick-card.lv5      {border-color:#5db5ef;box-shadow:0 0 12px rgba(255,255,255,.28),0 0 10px rgba(93,181,239,.3),0 14px 38px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.10)}
    .trick-card.one-solid{border-color:#5db5ef;box-shadow:0 0 18px rgba(93,181,239,.55),0 0 8px rgba(93,181,239,.35),0 14px 38px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12)}
    .trick-card.both-solid{border-color:#7ecef5;box-shadow:0 0 26px rgba(93,181,239,.72),0 0 12px rgba(93,181,239,.5),0 0 48px rgba(93,181,239,.25),inset 0 1px 0 rgba(255,255,255,.15)}

    .card-top{display:flex;align-items:center;gap:8px}
    .trick-name{font-size:14px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .trick-name:active{opacity:.7}
    .fav-btn{
      background:none;border:none;cursor:pointer;
      font-size:15px;color:var(--muted);padding:0 0 0 8px;flex-shrink:0;
      transition:color .13s,transform .13s;-webkit-tap-highlight-color:transparent;
    }
    .fav-btn.on{color:#f59e0b}
    .fav-btn:active{transform:scale(1.35)}

    .card-bot{display:flex;align-items:center;gap:8px}

    /* diff tag */
    .diff-tag{
      font-size:9px;font-weight:900;letter-spacing:.7px;
      padding:2px 7px;border-radius:var(--rss);border:1px solid transparent;
      cursor:pointer;white-space:nowrap;transition:all .13s;
      -webkit-tap-highlight-color:transparent;
      background:none;flex-shrink:0;position:relative;overflow:hidden;
      min-width:18px;min-height:16px;
    }
    .diff-tag::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.14),transparent);pointer-events:none}
    .diff-tag.unset      {background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);color:transparent}
    .diff-tag.beginner   {background:rgba(34,197,94,.14); color:#4ade80;border-color:rgba(34,197,94,.25)}
    .diff-tag.intermediate{background:rgba(245,158,11,.13);color:#fbbf24;border-color:rgba(245,158,11,.25)}
    .diff-tag.advanced   {background:rgba(239,68,68,.13); color:#f87171;border-color:rgba(239,68,68,.25)}
    .diff-tag.expert     {background:rgba(168,85,247,.16);color:#c084fc;border-color:rgba(168,85,247,.3)}

    .tracks{display:flex;gap:8px;align-items:center}
    .pip-track{
      display:flex;align-items:center;gap:4px;cursor:pointer;
      border-radius:var(--rs);padding:3px 5px;border:1px solid transparent;
      transition:border-color .13s,background .13s;-webkit-tap-highlight-color:transparent;
    }
    .pip-track:active{background:rgba(255,255,255,.06)}
    .side-lbl{font-size:7.5px;font-weight:900;letter-spacing:.8px;color:var(--muted);min-width:20px}
    .pip-track.has-progress .side-lbl{color:var(--text)}
    .pips{display:flex;gap:3px}
    .pip{width:8px;height:8px;border-radius:var(--rss);border:1px solid rgba(255,255,255,.12);background:transparent;transition:all .15s}
    .pip.f1{background:transparent;border-color:var(--pip);border-width:1.5px}
    .pip.f2{background:var(--pip);border-color:var(--pip)}
    .pip.f3{background:var(--pip);border-color:var(--pip);box-shadow:0 0 5px var(--pip),0 0 2px var(--pip)}
    .pip.f4{background:var(--pip);border-color:rgba(255,255,255,.82);box-shadow:0 0 2px rgba(255,255,255,.65),0 0 8px var(--pip),0 0 18px var(--pip),inset 0 0 4px rgba(255,255,255,.38)}
    .pip.f5{background:radial-gradient(circle at center,rgba(255,255,255,.92) 18%,var(--pip) 52%);border-color:rgba(255,255,255,.98);box-shadow:0 0 3px rgba(255,255,255,.85),0 0 10px var(--pip),0 0 22px var(--pip),0 0 5px rgba(255,255,255,.7)}
    .stage-lbl{font-size:7.5px;font-weight:700;min-width:10px}
    .sl-0{color:var(--muted)}
    .sl-1{color:var(--pip);opacity:.5}
    .sl-2{color:var(--pip);opacity:.75}
    .sl-3{color:var(--pip)}
    .sl-4{color:var(--pip);text-shadow:0 0 6px var(--pip)}
    .sl-5{color:#fff;text-shadow:0 0 6px #fff,0 0 12px var(--pip)}

    /* ── NAV ── */
    nav{
      position:fixed;bottom:0;left:0;right:0;
      padding:8px 0 env(safe-area-inset-bottom,10px);
      background:rgba(8,14,20,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex;justify-content:space-around;align-items:center;z-index:100;
    }
    .nav-btn{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      background:none;border:none;color:var(--muted);cursor:pointer;
      font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
      padding:3px 14px;border-radius:8px;transition:color .13s;-webkit-tap-highlight-color:transparent;
    }
    .nav-btn.active{color:var(--acc2)}

    /* ── COMPARE VIEW ── */
    .cmp-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;position:relative;overflow:hidden;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.07)}
    .cmp-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,var(--shine),transparent);border-radius:var(--r) var(--r) 0 0;pointer-events:none}
    .cmp-lbl{font-size:8.5px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .code-box{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px}
    .code-text{font-size:11px;font-weight:800;letter-spacing:1.5px;font-family:monospace;flex:1;color:var(--text)}
    .code-copy{background:none;border:none;color:var(--muted);cursor:pointer;padding:0 4px;font-size:16px;transition:color .13s;-webkit-tap-highlight-color:transparent}
    .code-copy:active{color:var(--text)}
    .rivals-empty{font-size:11px;color:var(--muted);padding:4px 0 8px;text-align:center}
    .rival-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
    .rival-row:last-child{border-bottom:none}
    .rival-label{font-size:11px;font-weight:800;min-width:56px;color:var(--text)}
    .rival-code{font-size:8.5px;font-family:monospace;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px}
    .rival-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;-webkit-tap-highlight-color:transparent;transition:color .13s}
    .rival-del:active{color:#f87171}
    .add-rival-row{display:flex;gap:6px;padding-top:8px}
    .cmp-input-field{flex:1;background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:11px;font-family:monospace;padding:7px 10px;outline:none;letter-spacing:1px;-webkit-appearance:none;transition:border-color .18s}
    .cmp-input-field:focus{border-color:var(--acc)}
    .cmp-go{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:var(--rs);color:#fff;font-size:11px;font-weight:800;padding:7px 12px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
    .cmp-go::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent);pointer-events:none}
    .cmp-actions{display:flex;gap:8px;margin-bottom:10px}
    .cmp-action-btn{flex:1;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .13s;position:relative;overflow:hidden}
    .blade-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;box-shadow:0 0 14px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18)}
    .blade-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.16),transparent);pointer-events:none}
    /* compare results */
    .cmp-summaries{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .cmp-sum-card{flex:1;min-width:72px;background:var(--panel);border:1px solid var(--border);border-radius:var(--rs);padding:7px 8px;position:relative;overflow:hidden;backdrop-filter:blur(16px);box-shadow:0 4px 12px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.06)}
    .cmp-sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,var(--shine),transparent);pointer-events:none}
    .cmp-sum-name{font-size:8px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .cmp-sum-row{display:flex;gap:5px;align-items:center}
    .cmp-sum-n{font-size:12px;font-weight:900}
    .cmp-sum-n.win-n{color:#4ade80}.cmp-sum-n.tie-n{color:var(--muted)}.cmp-sum-n.lose-n{color:#f87171}
    .cmp-list-hdr{display:flex;align-items:center;padding:2px 8px 4px 11px}
    .cmp-lh-name{flex:1;font-size:7px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
    .cmp-lh-cols{display:flex;gap:2px}
    .cmp-lh-col{width:26px;font-size:7px;font-weight:900;letter-spacing:.4px;text-align:center;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cmp-list{display:flex;flex-direction:column;gap:3px}
    .cmp-row{display:flex;align-items:center;gap:4px;padding:5px 8px 5px 11px;border-radius:var(--rs);border:1px solid var(--border);background:var(--panel)}
    .cmp-row.win{box-shadow:inset 3px 0 0 rgba(34,197,94,.65)}
    .cmp-row.lose{box-shadow:inset 3px 0 0 rgba(239,68,68,.55)}
    .cmp-row-name{flex:1;font-size:11px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cmp-cols{display:flex;gap:2px;flex-shrink:0}
    .cmp-col{width:26px;display:flex;gap:3px;justify-content:center;align-items:center}
    .win-col  .pip{filter:drop-shadow(0 0 3px #4ade80)}
    .lose-col .pip{filter:drop-shadow(0 0 3px #f87171)}
    .tie-col  .pip{opacity:.5}
    .cmp-err{text-align:center;padding:10px;color:#f87171;font-size:11px;font-weight:700;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);margin-top:4px}
    .cmp-sort-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .cmp-sort-btn{flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;font-size:10px;font-weight:800;padding:4px 9px;transition:all .13s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
    .cmp-sort-btn.active{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent;color:#fff}

    /* ── BLADER GAME ── */
    .blader-ov{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);flex-direction:column}
    .blader-ov.open{display:flex}
    .blader-top{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 10px}
    .blader-count{font-size:10px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
    .blader-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:4px 0}
    .blader-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 28px;gap:22px}
    .blader-name{font-size:clamp(26px,8vw,44px);font-weight:900;letter-spacing:-.5px;text-align:center;line-height:1.1;color:var(--acc2);text-shadow:0 0 40px var(--acc),0 0 80px var(--acc),0 2px 6px rgba(0,0,0,.55);position:relative}
    .blader-name.trick-known::after{
      content:'';position:absolute;top:50%;left:4%;right:4%;height:2px;
      transform:translateY(-50%);
      background:rgba(255,255,255,.92);
      box-shadow:0 0 4px 2px rgba(255,255,255,.8),0 0 12px 6px rgba(255,255,255,.5),0 0 30px 14px rgba(255,255,255,.25),0 0 60px 24px rgba(255,255,255,.1);
      border-radius:2px;pointer-events:none;z-index:-1;
    }
    .blader-bar-wrap{width:min(260px,80%);height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
    .blader-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .35s cubic-bezier(.4,0,.2,1)}
    .blader-done{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px}
    .blader-done.show{display:flex}
    .blader-done-ico{font-size:48px}
    .blader-done-title{font-size:22px;font-weight:900;color:var(--acc2);text-shadow:0 0 20px var(--acc)}
    .blader-done-sub{font-size:12px;color:var(--muted);text-align:center}
    .blader-footer{padding:16px 18px;padding-bottom:max(18px,env(safe-area-inset-bottom,18px))}
    .blader-btn{width:100%;padding:14px;border-radius:var(--rs);border:none;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:14px;font-weight:800;box-shadow:0 0 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18);-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
    .blader-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.16),transparent);pointer-events:none}
    .blader-btn.exit-btn{background:none;border:1px solid var(--border);color:var(--muted);box-shadow:none}
    .blader-btn.exit-btn::before{display:none}

    /* ── COMBO VIEW ── */
    .combo-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .combo-hdr-title{font-size:10px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
    .add-btn{
      display:flex;align-items:center;gap:5px;
      background:linear-gradient(135deg,var(--acc),var(--acc2));
      border:none;border-radius:var(--rs);color:#fff;
      font-size:11px;font-weight:800;padding:6px 12px;cursor:pointer;
      box-shadow:0 0 10px rgba(14,165,233,.3),inset 0 1px 0 rgba(255,255,255,.18);
      -webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;
    }
    .add-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent);pointer-events:none}

    /* combo sequence in card */
    .combo-seq{
      display:flex;flex-wrap:wrap;gap:4px;align-items:center;
      margin-top:2px;
    }
    .seq-pill{
      font-size:10px;font-weight:700;
      padding:2px 7px;border-radius:20px;
      border:1px solid var(--border);background:var(--panel);
      color:var(--text);white-space:nowrap;
    }
    .seq-pill.mod{
      background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.3);color:var(--acc2);
    }
    .seq-arrow{font-size:9px;color:var(--muted)}

    /* ── OVERLAYS / MODALS ── */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.65);z-index:200;
      align-items:flex-end;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    .overlay.open{display:flex}
    .modal{
      background:rgba(10,18,26,.94);border:1px solid var(--border);
      border-radius:20px 20px 0 0;
      padding:18px 18px env(safe-area-inset-bottom,24px);
      width:100%;max-height:82vh;overflow-y:auto;
      position:relative;
    }
    .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:35%;background:linear-gradient(to bottom,rgba(255,255,255,.04),transparent);border-radius:20px 20px 0 0;pointer-events:none}
    .modal-handle{width:32px;height:3px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 16px}
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
    .modal-title{font-size:18px;font-weight:900;letter-spacing:-.4px}
    .modal-desc{font-size:11px;color:rgba(232,230,255,.5);line-height:1.5;margin-bottom:16px;font-family:monospace;white-space:pre-wrap}
    .modal-stages{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .modal-side{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:10px 9px}
    .modal-side-title{font-size:9px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .stage-btns{display:flex;flex-direction:column;gap:5px}
    .stage-btn{
      display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);
      border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);
      font-size:10.5px;font-weight:700;transition:all .13s;-webkit-tap-highlight-color:transparent;
    }
    .stage-btn .s-ico{font-size:12px}
    .stage-btn.sel-0{border-color:rgba(93,181,239,.15);color:var(--text);background:rgba(93,181,239,.04)}
    .stage-btn.sel-1{border-color:rgba(93,181,239,.28);color:#a8d8f5;background:rgba(93,181,239,.07);box-shadow:0 0 4px rgba(93,181,239,.08)}
    .stage-btn.sel-2{border-color:rgba(93,181,239,.42);color:#bde3f8;background:rgba(93,181,239,.10);box-shadow:0 0 7px rgba(93,181,239,.14)}
    .stage-btn.sel-3{border-color:rgba(93,181,239,.58);color:#cceafa;background:rgba(93,181,239,.13);box-shadow:0 0 10px rgba(93,181,239,.22)}
    .stage-btn.sel-4{border-color:rgba(93,181,239,.76);color:#ddf0fc;background:rgba(93,181,239,.16);box-shadow:0 0 13px rgba(93,181,239,.32)}
    .stage-btn.sel-5{border-color:#5db5ef;color:#fff;background:rgba(93,181,239,.20);box-shadow:0 0 16px rgba(93,181,239,.45),0 0 28px rgba(93,181,239,.2)}
    .modal-note-lbl{font-size:9px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    textarea{
      width:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--rs);
      color:var(--text);font-size:13px;font-family:inherit;padding:9px 11px;
      resize:none;height:68px;outline:none;transition:border-color .18s;
    }
    textarea:focus{border-color:rgba(14,165,233,.55)}
    .save-btn{
      width:100%;padding:12px;border-radius:var(--rs);border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--acc),var(--acc2));
      color:#fff;font-size:13px;font-weight:800;
      box-shadow:0 0 14px rgba(14,165,233,.3),inset 0 1px 0 rgba(255,255,255,.18);
      position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
    }
    .save-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.16),transparent);pointer-events:none}
    .del-btn{
      width:100%;margin-top:10px;padding:10px;border-radius:var(--rs);
      border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);
      color:#f87171;font-size:12px;font-weight:700;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    /* ── COMBO BUILDER MODAL ── */
    .builder-section-lbl{
      font-size:9px;font-weight:900;letter-spacing:.9px;text-transform:uppercase;
      color:var(--muted);margin-bottom:8px;
    }
    /* sequence row */
    .builder-seq{
      display:flex;flex-wrap:wrap;gap:5px;align-items:center;
      background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
      padding:10px 10px;margin-bottom:14px;min-height:44px;
    }
    .bseq-pill{
      display:flex;align-items:center;gap:4px;
      font-size:11px;font-weight:700;
      padding:4px 8px 4px 10px;border-radius:20px;
      border:1px solid var(--border);background:var(--panel2);
      color:var(--text);cursor:pointer;transition:background .13s;
      -webkit-tap-highlight-color:transparent;
    }
    .bseq-pill.mod-pill{
      background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.35);color:var(--acc2);
    }
    .bseq-pill .x{font-size:10px;color:var(--muted);margin-left:1px}
    .bseq-arrow{font-size:10px;color:var(--muted);flex-shrink:0}
    .bseq-add{
      width:28px;height:28px;border-radius:8px;
      background:rgba(14,165,233,.15);border:1.5px dashed rgba(56,189,248,.4);
      color:var(--acc2);font-size:18px;font-weight:300;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:background .13s,border-color .13s;
      -webkit-tap-highlight-color:transparent;
    }
    .bseq-add:active{background:rgba(14,165,233,.28)}

    /* ── PICKER MODAL ── */
    .picker-tabs{display:flex;gap:6px;margin-bottom:14px}
    .picker-tab{
      flex:1;padding:7px;border-radius:var(--rs);
      border:1px solid var(--border);background:var(--panel);
      color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;
      transition:all .13s;-webkit-tap-highlight-color:transparent;
    }
    .picker-tab.active{
      background:linear-gradient(135deg,var(--acc),var(--acc2));
      border-color:rgba(56,189,248,.4);color:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
    }

    /* trick picker rows */
    .picker-trick-row{
      display:flex;align-items:center;gap:10px;
      padding:9px 10px;border-radius:var(--rs);
      border:1px solid transparent;
      cursor:pointer;transition:background .12s,border-color .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .picker-trick-row:active{background:var(--panel2);border-color:var(--border)}
    .ptr-name{font-size:13px;font-weight:700;flex:1}
    .ptr-pips{display:flex;gap:3px}
    .ptr-pip{width:7px;height:7px;border-radius:2px;border:1px solid rgba(255,255,255,.12);background:transparent}
    .ptr-pip.f1{background:transparent;border-color:var(--pip)}
    .ptr-pip.f2{background:var(--pip);border-color:var(--pip)}
    .ptr-pip.f3{background:var(--pip);border-color:var(--pip);box-shadow:0 0 3px var(--pip)}
    .ptr-pip.f4{background:var(--pip);border-color:var(--pip);box-shadow:0 0 6px var(--pip)}
    .ptr-pip.f5{background:radial-gradient(circle at center,rgba(255,255,255,.9) 18%,var(--pip) 52%);border-color:rgba(255,255,255,.95);box-shadow:0 0 4px rgba(255,255,255,.8),0 0 8px var(--pip)}
    .ptr-side-lbl{font-size:8px;font-weight:800;color:var(--muted);letter-spacing:.5px;min-width:18px}

    /* mod grid */
    .mod-grid{display:flex;flex-wrap:wrap;gap:7px}
    .mod-chip{
      padding:7px 14px;border-radius:var(--rs);
      border:1px solid rgba(56,189,248,.32);
      background:rgba(14,165,233,.12);
      color:var(--acc2);font-size:12px;font-weight:800;
      cursor:pointer;transition:all .13s;
      -webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;
    }
    .mod-chip::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.08),transparent);pointer-events:none}
    .mod-chip:active{background:rgba(14,165,233,.25)}

    .picker-empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:13px}

    .empty{text-align:center;padding:56px 20px;color:var(--muted)}
    .empty-ico{font-size:38px;margin-bottom:12px}
    .empty-ttl{font-size:15px;font-weight:800;color:var(--text);margin-bottom:5px}
    .empty-txt{font-size:13px;line-height:1.5}


    /* ── SHIMMER ── */
    @keyframes shimmer-run{
      from{transform:translateX(-100%)}
      to  {transform:translateX(450%)}
    }
    .shimmer-sweep{
      position:absolute;top:0;left:0;
      width:28%;height:3px;
      pointer-events:none;z-index:20;
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.5) 25%,rgba(255,255,255,.95) 50%,rgba(255,255,255,.5) 75%,transparent 100%);
      animation:shimmer-run 1.1s ease-in-out forwards;
    }
    .shimmer-sweep.intense{
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.6) 20%,rgba(255,255,255,1) 50%,rgba(255,255,255,.6) 80%,transparent 100%);
      box-shadow:0 0 6px 2px rgba(255,255,255,.5),0 0 14px 4px rgba(93,181,239,.4);
      height:4px;
    }

    @media(min-width:520px){
      .hdr-inner,main,.chips{max-width:480px;margin-left:auto;margin-right:auto}
      nav{max-width:480px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0}
    }
  </style>
</head>

  {id:'revert',   name:'Revert'},
  {id:'top',      name:'Topside'},
  {id:'neg',      name:'Negative'},
  {id:'180',      name:'180'},

const DIFFS   = ['beginner','intermediate','advanced','expert'];
const DLBL    = {beginner:'Base',intermediate:'Medio',advanced:'Avanzato',expert:'Expert'};
const DTEXT   = {beginner:'#4ade80',intermediate:'#fbbf24',advanced:'#f87171',expert:'#c084fc'};
const GRAD    = {beginner:'linear-gradient(90deg,#166534,#22c55e)',intermediate:'linear-gradient(90deg,#92400e,#f59e0b)',advanced:'linear-gradient(90deg,#991b1b,#ef4444)',expert:'linear-gradient(90deg,#5b21b6,#a855f7)'};
const STAGES  = [{lbl:'Mai provato'},{lbl:'Provato'},{lbl:'Capito'},{lbl:'Chiuso!!'},{lbl:"ce l'ho!"},{lbl:'Solido'}];
const SL_CLS  = ['sl-0','sl-1','sl-2','sl-3','sl-4','sl-5'];
const SL_TEXT = ['—','·','○','✓','◆','★'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state  = JSON.parse(localStorage.getItem('ag3') || '{}');
let combos = JSON.parse(localStorage.getItem('ag3_combos') || '[]');

function get(id)      {return state[id]||{nat:0,sw:0,diff:null,fav:false,note:''}}
function save()       {localStorage.setItem('ag3',JSON.stringify(state))}
function patch(id,p)  {state[id]={...get(id),...p};save()}
function tDiff(id)    {return get(id).diff||null}
function saveCombos() {localStorage.setItem('ag3_combos',JSON.stringify(combos))}
function getCombo(id) {return combos.find(c=>c.id===id)}

// ── VIEW / FILTER ─────────────────────────────────────────────────────────────
let view='tricks', filter='all';
let modalId=null, comboModalId=null;

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');filter=c.dataset.f;renderTricks();
}));

function matchFilter(t){
  const s=get(t.id);
  if(filter==='all')      return true;
  if(filter==='fav')      return s.fav;
  if(filter==='none')     return s.nat===0&&s.sw===0;
  if(filter==='chiudilo') return s.nat===2||s.sw===2;
  if(filter==='elosw')    return s.nat>=4&&s.sw<=2;
  if(filter==='consolida')return (s.nat===3||s.nat===4)||(s.sw===3||s.sw===4);
  return true;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function pipHtml(stage,size=''){
  return [1,2,3,4,5].map(i=>`<div class="pip${size} ${stage>=i?'f'+Math.min(i,5):''}"></div>`).join('');
}
function stageLbl(s){return`<span class="stage-lbl ${SL_CLS[s]}">${SL_TEXT[s]}</span>`}

// ── TRICK CARD ────────────────────────────────────────────────────────────────
function cardHtml(t){
  const s=get(t.id);
  const mx=Math.max(s.nat,s.sw);
  const cls=(s.nat===5&&s.sw===5)?'both-solid':(s.nat===5||s.sw===5)?'one-solid':mx>=4?'lv5':mx>=3?'lv4':'';
  return `<div class="trick-card ${cls}" data-id="${t.id}">
    <div class="card-top">
      <div class="trick-name" onclick="openModal('${t.id}')">${t.name}</div>
      <div class="tracks">
        <div class="pip-track ${s.nat>0?'has-progress':''}" onclick="cycleSide('${t.id}','nat')">
          <span class="side-lbl">NAT</span>
          <div class="pips">${pipHtml(s.nat)}</div>
        </div>
        <div class="pip-track ${s.sw>0?'has-progress':''}" onclick="cycleSide('${t.id}','sw')">
          <span class="side-lbl">SW</span>
          <div class="pips">${pipHtml(s.sw)}</div>
        </div>
      </div>
      <button class="fav-btn ${s.fav?'on':''}" onclick="patch('${t.id}',{fav:${!s.fav}});updateCard('${t.id}')">${s.fav?'★':'☆'}</button>
    </div>
  </div>`;
}

// ── COMBO CARD ────────────────────────────────────────────────────────────────
function comboCardHtml(c){
  const cls=(c.nat===5&&c.sw===5)?'both-solid':(c.nat===5||c.sw===5)?'one-solid':'';
  const seqHtml = c.items.map((item,i)=>{
    const arrow = i>0?`<span class="seq-arrow">→</span>`:'';
    const pillCls = (item.type==='mod'||item.type==='grab'||item.type==='var')?'seq-pill mod':'seq-pill';
    return `${arrow}<span class="${pillCls}">${item.name}</span>`;
  }).join('');
  return `<div class="trick-card ${cls}" onclick="openComboModal('${c.id}')">
    <div class="card-top" style="margin-bottom:5px">
      <div class="combo-seq">${seqHtml}</div>
    </div>
    <div class="card-bot">
      <div class="tracks">
        <div class="pip-track ${c.nat>0?'has-progress':''}" onclick="event.stopPropagation();cycleComboSide('${c.id}','nat')">
          <span class="side-lbl">NAT</span>
          <div class="pips">${pipHtml(c.nat)}</div>
          ${stageLbl(c.nat)}
        </div>
        <div class="pip-track ${c.sw>0?'has-progress':''}" onclick="event.stopPropagation();cycleComboSide('${c.id}','sw')">
          <span class="side-lbl">SW</span>
          <div class="pips">${pipHtml(c.sw)}</div>
          ${stageLbl(c.sw)}
        </div>
      </div>
    </div>
  </div>`;
}

// ── UPDATE CARD IN-PLACE (no re-sort) ─────────────────────────────────────────
function updateCard(id){
  const t=TRICKS.find(x=>x.id===id);if(!t)return;
  const el=document.querySelector(`.trick-card[data-id="${id}"]`);
  if(el){const tmp=document.createElement('div');tmp.innerHTML=cardHtml(t);el.replaceWith(tmp.firstElementChild);}
  updateCounts();
}

// ── CYCLE ─────────────────────────────────────────────────────────────────────
function cycleSide(id,side){patch(id,{[side]:(get(id)[side]+1)%6});updateCard(id);}

function cycleDiff(id,fromModal=false){
  const tid=fromModal?modalId:id;
  if(!tid)return;
  const cur=tDiff(tid);
  const idx=cur?DIFFS.indexOf(cur):-1;
  const next=idx<DIFFS.length-1?DIFFS[idx+1]:null;
  patch(tid,{diff:next});
  if(fromModal)syncModal();
  updateCard(tid);
}

function cycleComboSide(id,side){
  const c=getCombo(id);if(!c)return;
  c[side]=(c[side]+1)%6;saveCombos();renderCombos();
  if(comboModalId===id)syncComboModal();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTricks(){
  const list=TRICKS
    .filter(t=>matchFilter(t))
    .sort((a,b)=>{
      const sa=get(a.id), sb=get(b.id);
      if(sb.fav!==sa.fav) return sa.fav?-1:1;
      const pa=Math.max(sa.nat,sa.sw)*10+sa.nat+sa.sw;
      const pb=Math.max(sb.nat,sb.sw)*10+sb.nat+sb.sw;
      if(pa!==pb) return pb-pa;
      return a.name.localeCompare(b.name,'it');
    });
  document.getElementById('trick-list').innerHTML=list.map(cardHtml).join('');
  document.getElementById('no-res').style.display=list.length?'none':'block';
  updateCounts();
}

// ── ENCODE / DECODE (base36, 18 chars, BigInt) ────────────────────────────────
const _B36='0123456789abcdefghijklmnopqrstuvwxyz';
const _CODE_LEN=30;
function encodeProgress(){
  let n=0n;
  for(let i=TRICKS.length-1;i>=0;i--){const s=get(TRICKS[i].id);n=n*36n+BigInt((s.nat||0)*6+(s.sw||0));}
  let code='';
  for(let i=0;i<_CODE_LEN;i++){code=_B36[Number(n%36n)]+code;n/=36n;}
  return code;
}
function decodeProgress(code){
  const c=(code||'').toLowerCase().replace(/[^0-9a-z]/g,'');
  if(c.length!==_CODE_LEN)return null;
  let n=0n;
  for(const ch of c){const v=_B36.indexOf(ch);if(v<0)return null;n=n*36n+BigInt(v);}
  const r={};
  for(let i=0;i<TRICKS.length;i++){const v=Number(n%36n);r[TRICKS[i].id]={nat:Math.floor(v/6),sw:v%6};n/=36n;}
  return r;
}

let rivals=JSON.parse(localStorage.getItem('ag3_rivals')||'[]');
function saveRivals(){localStorage.setItem('ag3_rivals',JSON.stringify(rivals));}

// ── COMPARE ───────────────────────────────────────────────────────────────────
let cmpSort='similar';
let lastDecoded=null;

function runCompare(){
  if(!rivals.length)return;
  lastDecoded=rivals.map(r=>({...r,st:decodeProgress(r.code)}));
  renderCompareResult();
}

function setCmpSort(mode){cmpSort=mode;renderCompareResult();}

function renderCompareResult(){
  if(!lastDecoded)return;
  const el=document.getElementById('cmp-result');
  const decoded=lastDecoded;

  // per-rival summary cards
  const summaryHtml=decoded.map(r=>{
    let w=0,l=0,t=0;
    TRICKS.forEach(trick=>{
      const me=get(trick.id),th=r.st[trick.id]||{nat:0,sw:0};
      const d=(me.nat+me.sw)-(th.nat+th.sw);
      if(d>0)w++;else if(d<0)l++;else t++;
    });
    return`<div class="cmp-sum-card">
      <div class="cmp-sum-name">${r.label}</div>
      <div class="cmp-sum-row">
        <span class="cmp-sum-n win-n">▲${w}</span>
        <span class="cmp-sum-n tie-n">=${t}</span>
        <span class="cmp-sum-n lose-n">▼${l}</span>
      </div>
    </div>`;
  }).join('');

  // sort bar
  const sortModes=[
    {id:'similar',      lbl:'Simili'},
    {id:'both-unknown', lbl:'Mai fatti'},
    {id:'i-lead',       lbl:'Io avanti'},
    {id:'they-lead',    lbl:'Loro avanti'},
  ];
  const sortBar=`<div class="cmp-sort-bar">${sortModes.map(m=>`<button class="cmp-sort-btn${cmpSort===m.id?' active':''}" onclick="setCmpSort('${m.id}')">${m.lbl}</button>`).join('')}</div>`;

  // sort tricks
  let tricks=[...TRICKS];
  if(cmpSort==='similar'){
    tricks=tricks.filter(t=>{
      const me=get(t.id);
      const totR=decoded.reduce((s,r)=>{const th=r.st[t.id]||{nat:0,sw:0};return s+th.nat+th.sw;},0);
      return me.nat+me.sw>0||totR>0;
    }).sort((a,b)=>{
      const dA=decoded.reduce((s,r)=>{const th=r.st[a.id]||{nat:0,sw:0};return s+Math.abs((get(a.id).nat+get(a.id).sw)-(th.nat+th.sw));},0);
      const dB=decoded.reduce((s,r)=>{const th=r.st[b.id]||{nat:0,sw:0};return s+Math.abs((get(b.id).nat+get(b.id).sw)-(th.nat+th.sw));},0);
      return dA-dB;
    });
  } else if(cmpSort==='diff'){
    const dOrder={expert:0,advanced:1,intermediate:2,beginner:3};
    tricks.sort((a,b)=>(dOrder[tDiff(a.id)]??4)-(dOrder[tDiff(b.id)]??4));
  } else if(cmpSort==='both-unknown'){
    tricks=tricks.filter(t=>{
      const me=get(t.id);
      if(me.nat+me.sw>0)return false;
      return decoded.every(r=>{const th=r.st[t.id];return!th||(th.nat+th.sw===0);});
    });
  } else if(cmpSort==='i-lead'){
    tricks=tricks.filter(t=>{
      const me=get(t.id);
      return decoded.some(r=>{const th=r.st[t.id]||{nat:0,sw:0};return(me.nat+me.sw)>(th.nat+th.sw);});
    }).sort((a,b)=>{
      const lA=decoded.reduce((s,r)=>{const th=r.st[a.id]||{nat:0,sw:0};return s+(get(a.id).nat+get(a.id).sw)-(th.nat+th.sw);},0);
      const lB=decoded.reduce((s,r)=>{const th=r.st[b.id]||{nat:0,sw:0};return s+(get(b.id).nat+get(b.id).sw)-(th.nat+th.sw);},0);
      return lB-lA;
    });
  } else if(cmpSort==='they-lead'){
    tricks=tricks.filter(t=>{
      const me=get(t.id);
      return decoded.some(r=>{const th=r.st[t.id]||{nat:0,sw:0};return(me.nat+me.sw)<(th.nat+th.sw);});
    }).sort((a,b)=>{
      const lA=decoded.reduce((s,r)=>{const th=r.st[a.id]||{nat:0,sw:0};return s+(th.nat+th.sw)-(get(a.id).nat+get(a.id).sw);},0);
      const lB=decoded.reduce((s,r)=>{const th=r.st[b.id]||{nat:0,sw:0};return s+(th.nat+th.sw)-(get(b.id).nat+get(b.id).sw);},0);
      return lB-lA;
    });
  }

  // column headers
  const hdrs=['Tu',...decoded.map(r=>r.label.replace('Blader ','B'))];
  const hdrHtml=hdrs.map(h=>`<div class="cmp-lh-col">${h}</div>`).join('');

  // trick rows
  const rowsHtml=tricks.map(trick=>{
    const me=get(trick.id);
    const myScore=me.nat+me.sw;
    const rivalData=decoded.map(r=>{
      const th=r.st[trick.id]||{nat:0,sw:0};
      return{nat:th.nat,sw:th.sw,score:th.nat+th.sw,diff:myScore-(th.nat+th.sw)};
    });
    const anyLose=rivalData.some(r=>r.diff<0);
    const anyWin=rivalData.some(r=>r.diff>0);
    const rowCls=anyLose&&!anyWin?'lose':!anyLose&&anyWin?'win':'';
    const cmpPip=v=>`<div class="pip${v>0?' f'+v:''}"></div>`;
    const myCol=`<div class="cmp-col me-col">${cmpPip(me.nat)}${cmpPip(me.sw)}</div>`;
    const rivCols=rivalData.map(r=>{
      const cls=r.diff>0?'win-col':r.diff<0?'lose-col':'tie-col';
      return`<div class="cmp-col ${cls}">${cmpPip(r.nat)}${cmpPip(r.sw)}</div>`;
    }).join('');
    return`<div class="cmp-row ${rowCls}">
      <div class="cmp-row-name">${trick.name}</div>
      <div class="cmp-cols">${myCol}${rivCols}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="cmp-summaries">${summaryHtml}</div>
    ${sortBar}
    <div class="cmp-list-hdr"><div class="cmp-lh-name">Trick</div><div class="cmp-lh-cols">${hdrHtml}</div></div>
    <div class="cmp-list">${rowsHtml||'<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">Nessun trick in questa categoria</div>'}</div>`;
}

function copyMyCode(){
  const code=encodeProgress();
  const btn=document.querySelector('.code-copy');
  const orig=btn.innerHTML;
  const done=()=>{btn.textContent='✓';setTimeout(()=>btn.innerHTML=orig,1500)};
  if(navigator.clipboard){navigator.clipboard.writeText(code).then(done).catch(()=>{_fbCopy(code);done()});}
  else{_fbCopy(code);done();}
}
function _fbCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);}

// ── BLADER GAME ───────────────────────────────────────────────────────────────
let bladerQueue=[],bladerIdx=0;

function getSharedTricks(){
  const decoded=rivals.map(r=>decodeProgress(r.code)).filter(Boolean);
  return TRICKS.filter(t=>{
    const me=get(t.id);
    if(me.nat<1&&me.sw<1)return false;
    return decoded.every(d=>{const th=d[t.id];return th&&(th.nat>=1||th.sw>=1);});
  });
}

function startBlader(){
  const shared=getSharedTricks();
  if(!shared.length){
    document.getElementById('cmp-result').innerHTML='<div class="cmp-err">Nessun trick in comune — assicuratevi di aver provato almeno un trick ciascuno.</div>';
    return;
  }
  bladerQueue=[...shared].sort(()=>Math.random()-.5);
  bladerIdx=0;
  showBladerTrick();
  document.getElementById('overlay-blader').classList.add('open');
}

function trickHasSolid(id){
  const s=get(id);
  if(s.nat>=4||s.sw>=4)return true;
  for(const r of rivals){
    const rd=decodeProgress(r.code);if(!rd)continue;
    const rs=rd[id]||{nat:0,sw:0};
    if(rs.nat>=4||rs.sw>=4)return true;
  }
  return false;
}
function showBladerTrick(){
  const total=bladerQueue.length;
  const t=bladerQueue[bladerIdx];
  document.getElementById('blader-count').textContent=`${bladerIdx+1} / ${total}`;
  const nameEl=document.getElementById('blader-name');
  nameEl.textContent=t.name;
  nameEl.classList.toggle('trick-known',trickHasSolid(t.id));
  document.getElementById('blader-fill').style.width=`${(bladerIdx+1)/total*100}%`;
}

function nextBladerTrick(){
  bladerIdx++;
  if(bladerIdx>=bladerQueue.length){
    bladerQueue=[...bladerQueue].sort(()=>Math.random()-.5);
    bladerIdx=0;
  }
  showBladerTrick();
}

function exitBlader(){
  document.getElementById('overlay-blader').classList.remove('open');
  bladerQueue=[];bladerIdx=0;
}

function renderCombos(){
  const el=document.getElementById('combo-list');
  if(!combos.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">🔗</div><div class="empty-ttl">Nessuna combo</div><div class="empty-txt">Aggiungi le combinazioni che stai lavorando</div></div>`;
  }else{
    el.innerHTML=combos.map(comboCardHtml).join('');
  }
}

function updateCounts(){
  document.getElementById('hc-nat').textContent=TRICKS.filter(t=>get(t.id).nat>=3).length;
  document.getElementById('hc-sw').textContent=TRICKS.filter(t=>get(t.id).sw>=3).length;
}

function rerender(){
  if(view==='tricks')renderTricks();
  if(view==='compare')renderCompareView();
  if(view==='combo')renderCombos();
  if(modalId)syncModal();
}

// ── TRICK MODAL ───────────────────────────────────────────────────────────────
function openModal(id){
  const t=TRICKS.find(x=>x.id===id);if(!t)return;
  modalId=id;
  document.getElementById('m-name').textContent=t.name;
  document.getElementById('m-note').value=get(id).note||'';
  syncModal();
  document.getElementById('overlay').classList.add('open');
}
function syncModal(){
  const s=get(modalId),d=tDiff(modalId);
  const dtag=document.getElementById('m-diff');
  dtag.textContent=d?DLBL[d]:'';
  dtag.className=`diff-tag ${d||'unset'}`;
  ['nat','sw'].forEach(side=>{
    const val=s[side];
    document.getElementById(`m-${side}-btns`).innerHTML=STAGES.map((st,i)=>
      `<button class="stage-btn ${val===i?'sel-'+i:''}" onclick="setStage('${side}',${i})"><div class="pip${i>0?' f'+i:''}"></div>${st.lbl}</button>`
    ).join('');
  });
}
function setStage(side,val){patch(modalId,{[side]:val});updateCard(modalId);syncModal();}
document.getElementById('m-note').addEventListener('input',e=>{if(modalId)patch(modalId,{note:e.target.value})});

// ── COMBO BUILDER ─────────────────────────────────────────────────────────────
let builderItems = []; // [{type:'trick'|'mod', id, name}]

function openBuilder(){
  builderItems=[];
  renderBuilderSeq();
  document.getElementById('overlay-builder').classList.add('open');
}

function renderBuilderSeq(){
  const seq=document.getElementById('builder-seq');
  let html='';
  builderItems.forEach((item,i)=>{
    if(i>0) html+=`<span class="bseq-arrow">→</span>`;
    const cls=(item.type==='mod'||item.type==='grab'||item.type==='var')?'bseq-pill mod-pill':'bseq-pill';
    html+=`<button class="${cls}" onclick="removeBuilderItem(${i})">${item.name}<span class="x">×</span></button>`;
  });
  // always show the + slot
  if(builderItems.length>0) html+=`<span class="bseq-arrow">→</span>`;
  html+=`<button class="bseq-add" onclick="openPicker()">+</button>`;
  seq.innerHTML=html;
  // show/hide save based on min 2 items
  document.getElementById('builder-save').style.opacity=builderItems.length>=2?'1':'.4';
}

function removeBuilderItem(i){
  builderItems.splice(i,1);
  renderBuilderSeq();
}

function saveCombo(){
  if(builderItems.length<2)return;
  const name=builderItems.map(i=>i.name).join(' → ');
  combos.push({id:'c_'+Date.now(),items:[...builderItems],name,nat:0,sw:0,note:''});
  saveCombos();renderCombos();
  document.getElementById('overlay-builder').classList.remove('open');
  builderItems=[];
}

// ── PICKER ────────────────────────────────────────────────────────────────────
let pickerTab='trick';

function openPicker(){
  pickerTab='trick';
  ['trick','mod','var'].forEach(t=>document.getElementById('ptab-'+t)?.classList.toggle('active',t==='trick'));
  renderPickerTricks();
  document.getElementById('picker-trick-list').style.display='';
  document.getElementById('picker-mod-grid').style.display='none';
  document.getElementById('picker-var-form').style.display='none';
  document.getElementById('overlay-picker').classList.add('open');
}

function switchPickerTab(tab){
  pickerTab=tab;
  ['trick','mod','var'].forEach(t=>document.getElementById('ptab-'+t)?.classList.toggle('active',t===tab));
  document.getElementById('picker-trick-list').style.display=tab==='trick'?'':'none';
  document.getElementById('picker-mod-grid').style.display=tab==='mod'?'':'none';
  document.getElementById('picker-var-form').style.display=tab==='var'?'flex':'none';
  if(tab==='mod')renderPickerMods();
}

function renderPickerTricks(){
  // show tricks that have been tried at least once (nat>=1 or sw>=1)
  const tried=TRICKS.filter(t=>get(t.id).nat>=1||get(t.id).sw>=1);
  if(!tried.length){
    document.getElementById('picker-trick-list').innerHTML=`<div class="picker-empty">Prova almeno un trick per aggiungerlo alle combo</div>`;
    return;
  }
  document.getElementById('picker-trick-list').innerHTML=tried.map(t=>{
    const s=get(t.id);
    const natPips=[1,2,3,4].map(i=>`<div class="ptr-pip ${s.nat>=i?'f'+i:''}"></div>`).join('');
    const swPips =[1,2,3,4].map(i=>`<div class="ptr-pip ${s.sw>=i?'f'+i:''}"></div>`).join('');
    return`<div class="picker-trick-row" onclick="pickTrick('${t.id}','${t.name.replace(/'/g,"\\'")}')" >
      <div class="ptr-name">${t.name}</div>
      <span class="ptr-side-lbl">NAT</span><div class="ptr-pips">${natPips}</div>
      <span class="ptr-side-lbl" style="margin-left:6px">SW</span><div class="ptr-pips">${swPips}</div>
    </div>`;
  }).join('');
}

function renderPickerMods(){
  document.getElementById('picker-mod-grid').innerHTML=MODS.map(m=>
    `<button class="mod-chip" onclick="pickMod('${m.id}','${m.name}')">${m.name}</button>`
  ).join('');
}

function pickTrick(id,name){
  builderItems.push({type:'trick',id,name});
  document.getElementById('overlay-picker').classList.remove('open');
  renderBuilderSeq();
}

function pickMod(id,name){
  builderItems.push({type:'mod',id,name});
  document.getElementById('overlay-picker').classList.remove('open');
  renderBuilderSeq();
}


function pickVariant(){
  const inp=document.getElementById('var-input');
  const name=(inp.value||'').trim();
  if(!name)return;
  builderItems.push({type:'var',id:'v_'+Date.now(),name});
  inp.value='';
  document.getElementById('overlay-picker').classList.remove('open');
  renderBuilderSeq();
}

// ── COMBO DETAIL MODAL ────────────────────────────────────────────────────────
function openComboModal(id){
  const c=getCombo(id);if(!c)return;
  comboModalId=id;
  const seqHtml=c.items.map((item,i)=>{
    const arrow=i>0?` → `:'';
    return arrow+item.name;
  }).join('');
  document.getElementById('cm-name').textContent=seqHtml;
  document.getElementById('cm-note').value=c.note||'';
  syncComboModal();
  document.getElementById('overlay-combo-detail').classList.add('open');
}
function syncComboModal(){
  const c=getCombo(comboModalId);if(!c)return;
  ['nat','sw'].forEach(side=>{
    const val=c[side];
    document.getElementById(`cm-${side}-btns`).innerHTML=STAGES.map((st,i)=>
      `<button class="stage-btn ${val===i?'sel-'+i:''}" onclick="setComboStage('${side}',${i})"><div class="pip${i>0?' f'+i:''}"></div>${st.lbl}</button>`
    ).join('');
  });
}
function setComboStage(side,val){
  const c=getCombo(comboModalId);if(!c)return;
  c[side]=val;saveCombos();syncComboModal();renderCombos();
}
document.getElementById('cm-note').addEventListener('input',e=>{
  const c=getCombo(comboModalId);if(c){c.note=e.target.value;saveCombos();}
});
function deleteCombo(){
  combos=combos.filter(c=>c.id!==comboModalId);
  saveCombos();renderCombos();
  document.getElementById('overlay-combo-detail').classList.remove('open');
  comboModalId=null;
}

// ── CLOSE ─────────────────────────────────────────────────────────────────────
function maybeClose(e,overlayId){
  if(e.target===document.getElementById(overlayId)){
    document.getElementById(overlayId).classList.remove('open');
    if(overlayId==='overlay')modalId=null;
    if(overlayId==='overlay-combo-detail')comboModalId=null;
  }
}

// ── VIEW SWITCH ───────────────────────────────────────────────────────────────
function switchView(v){
  view=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[data-v="${v}"]`).classList.add('active');
  document.getElementById('chips').style.display=v==='tricks'?'':'none';
  if(v==='compare')renderCompareView();
  else rerender();
}

// ── SHIMMER ───────────────────────────────────────────────────────────────────
function triggerShimmer(card,intense=false){
  if(!card||card.querySelector('.shimmer-sweep'))return;
  const el=document.createElement('div');
  el.className='shimmer-sweep'+(intense?' intense':'');
  card.appendChild(el);
  el.addEventListener('animationend',()=>el.remove(),{once:true});
}
function solidCards(){
  return [...document.querySelectorAll('.trick-card')].filter(c=>{
    const s=get(c.dataset.id);return s.nat>=4||s.sw>=4;
  });
}
function scheduleShimmer(){
  const delay=3500+Math.random()*4000;
  setTimeout(()=>{
    const pool=solidCards();
    if(pool.length){
      const card=pool[Math.floor(Math.random()*pool.length)];
      const s=get(card.dataset.id);
      triggerShimmer(card,s.nat===5||s.sw===5);
      if(Math.random()>.65){
        setTimeout(()=>{
          const p2=solidCards();
          if(p2.length){
            const c2=p2[Math.floor(Math.random()*p2.length)];
            const s2=get(c2.dataset.id);
            triggerShimmer(c2,s2.nat===5||s2.sw===5);
          }
        },400+Math.random()*500);
      }
    }
    scheduleShimmer();
  },delay);
}
scheduleShimmer();

renderTricks();
</script>
